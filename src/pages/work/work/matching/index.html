<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="refresh" content="0; url=../../" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var knownRoots = new Set(["work", "contact", "about", "designsystem", "public", "framer"]);
        var segments = window.location.pathname.split("/").filter(Boolean);
        var prefix = segments.length > 0 && !knownRoots.has(segments[0].toLowerCase()) ? "/" + segments[0] : "";
        window.location.replace(prefix + "/work/");
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="../../">Work</a>...</p>
  </body>
</html>
